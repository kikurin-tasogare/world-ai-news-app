name: Update AI News (Daily)

on:
  schedule:
    # 毎朝 7:00 JST = 22:00 UTC（前日）
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and build news JSON
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/update-news.js

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sample-news.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: ニュースを自動更新 ($(date -u +'%Y-%m-%d'))"
          git push origin main

      - name: Sync gh-pages branch
        run: git push origin main:gh-pages -f
