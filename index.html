<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="世界のAIニュースを、非エンジニアにもわかりやすくまとめて表示">
  <meta name="theme-color" content="#1a1614">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI News">
  <title>🌍 World AI News</title>
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__title">🌍 World AI News</h1>
      <p class="header__subtitle">タブをタップすると最新ニュースを取得します</p>
    </div>
  </header>

  <aside class="install-hint" id="install-hint" hidden>
    <p class="install-hint__text">📱 iPhoneで使うなら、共有ボタン → <strong>ホーム画面に追加</strong></p>
    <button type="button" class="install-hint__close" id="install-hint-close" aria-label="閉じる">×</button>
  </aside>

  <main class="main">
    <section class="filters" aria-label="カテゴリフィルター">
      <div class="filters__group">
        <h2 class="filters__label">カテゴリ</h2>
        <div class="filters__buttons" id="category-filters" role="group" aria-label="カテゴリで絞り込み">
          <!-- Generated by app.js -->
        </div>
      </div>
      <div class="filters__group">
        <h2 class="filters__label">レベル</h2>
        <div class="filters__buttons" id="level-filters" role="group" aria-label="レベルで絞り込み">
          <!-- Generated by app.js -->
        </div>
      </div>
    </section>

    <p class="result-count" id="result-count" aria-live="polite"></p>

    <section class="news-list" id="news-list" aria-label="ニュース一覧">
      <!-- Generated by app.js -->
    </section>

    <p class="empty-state" id="empty-state" hidden>
      条件に合うニュースがありません。フィルターを変更してみてください。
    </p>
  </main>

  <footer class="footer">
    <p>v1 — 4G/5G/Wi-Fi どれでもOK。サンプルデータで動作中。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
